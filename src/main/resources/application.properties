# ==========================================
# 1. CONFIGURACIėN DE LA BASE DE DATOS (MYSQL)
# ==========================================
# Puerto por defecto de MySQL es 3306
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/yupi_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 2. CONFIGURACIėN DE JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# 3. CONFIGURACIėN DEL SERVIDOR
# ==========================================
server.port=${PORT:8080}